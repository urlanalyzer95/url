<h2>📊 Обратная связь пользователей</h2>
{% for fb in feedbacks %}
<div class="feedback-item">
  <strong>{{ fb.url }}</strong> 
  <span class="{% if fb.feedback=='false_positive' %}safe{% else %}danger{% endif %}">
    {{ fb.feedback.replace('_', ' ').title() }}
  </span>
  <small>{{ fb.timestamp }}</small>
</div>
{% endfor %}
